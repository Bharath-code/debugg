name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - beta
      - alpha
      - next
      - next-major

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run type check
        run: bun run typecheck

      - name: Run linter
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build library
        run: bun run build

      - name: Verify build
        run: |
          test -f dist/index.js
          test -f dist/index.mjs
          test -f dist/index.d.ts
          echo "✓ Build verification passed"

      - name: Run bundle size check
        run: bun run build:size
        continue-on-error: true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Upload bundle report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bundle-report
          path: bundle-report.json

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: release
    if: always()

    steps:
      - name: Notify success
        if: needs.release.result == 'success'
        run: |
          echo "✅ Release completed successfully!"
          echo "Check the releases tab for the new version."

      - name: Notify failure
        if: needs.release.result == 'failure'
        run: |
          echo "❌ Release failed!"
          echo "Check the workflow logs for details."
          exit 1
