<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Debugg Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f0f11 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      color: #e4e4e7;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .logo p {
      color: #71717a;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      color: #a1a1aa;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 8px;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #27272a;
      border-radius: 8px;
      background: #0f0f11;
      color: #e4e4e7;
      font-size: 1rem;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }
    .btn {
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #dc2626 0%, #2563eb 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(220, 38, 38, 0.4);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 0.875rem;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .info-box {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid #3b82f6;
      color: #93c5fd;
      padding: 16px;
      border-radius: 8px;
      margin-top: 24px;
      font-size: 0.875rem;
    }
    .info-box code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      color: #71717a;
      font-size: 0.875rem;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>🐞 Debugg</h1>
      <p>Dashboard Login</p>
    </div>

    <div class="error-message" id="error-message"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="api-key">API Key</label>
        <input
          type="password"
          id="api-key"
          name="apiKey"
          placeholder="Enter your API key"
          required
          autocomplete="off"
        >
      </div>

      <input type="hidden" id="redirect" name="redirect" value="">

      <button type="submit" class="btn btn-primary" id="submit-btn">
        Sign In
      </button>
    </form>

    <div class="info-box">
      <strong>ℹ️ Default Credentials:</strong><br>
      Development API Key: <code>debugg-dev-key-change-in-production</code><br><br>
      <strong>⚠️ Important:</strong> Change this in production by setting the 
      <code>DASHBOARD_API_KEY</code> environment variable.
    </div>

    <div class="footer">
      <p>Debugg Dashboard v2.0</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');
    const redirectInput = document.getElementById('redirect');

    // Get redirect URL from query params
    const urlParams = new URLSearchParams(window.location.search);
    const redirect = urlParams.get('redirect');
    if (redirect) {
      redirectInput.value = redirect;
    }

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const apiKey = document.getElementById('api-key').value;
      const redirect = redirectInput.value || '/';

      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Signing in...';
      errorMessage.classList.remove('show');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ apiKey, redirect }),
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Login successful
          window.location.href = data.redirect || '/';
        } else {
          // Login failed
          showError(data.error || 'Login failed. Please try again.');
        }
      } catch (error) {
        showError('Network error. Please check your connection and try again.');
      } finally {
        // Reset button state
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Sign In';
      }
    });

    // Show error message
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
    }

    // Check if already logged in
    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/status');
        const data = await response.json();

        if (data.authenticated) {
          // Already logged in, redirect to dashboard
          window.location.href = redirectInput.value || '/';
        }
      } catch (error) {
        // Continue with login form
      }
    }

    // Check auth on page load
    checkAuth();
  </script>
</body>
</html>
